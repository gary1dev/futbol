[build]
  publish = "frontend"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirige /api/datos → la Function JS
[[redirects]]
  from = "/api/datos"
  to   = "/.netlify/functions/datos"
  status = 200

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
